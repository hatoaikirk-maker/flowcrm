<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowCRM — 銷售管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --white:#ffffff;--gray-50:#f8f9fb;--gray-100:#f0f2f5;--gray-200:#e4e7ec;
  --gray-300:#d0d5dd;--gray-400:#98a2b3;--gray-500:#667085;--gray-700:#344054;
  --gray-900:#101828;--accent:#2563eb;--accent-light:#eff6ff;--accent-border:#bfdbfe;
  --lead:#f59e0b;--qualify:#3b82f6;--proposal:#8b5cf6;--won:#10b981;--lost:#ef4444;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow-xs:0 1px 2px rgba(16,24,40,.05);
  --shadow-sm:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --shadow-md:0 4px 8px -2px rgba(16,24,40,.1),0 2px 4px -2px rgba(16,24,40,.06);
  --shadow-lg:0 12px 24px -4px rgba(16,24,40,.12),0 4px 8px -2px rgba(16,24,40,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200);height:56px;display:flex;align-items:center;padding:0 24px;gap:0}
.brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--gray-900);letter-spacing:-.02em;margin-right:32px;text-decoration:none}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.nav{display:flex;align-items:center;gap:2px;flex:1}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;font-size:13.5px;color:var(--gray-500);font-weight:500;transition:all .15s}
.nav-btn:hover{background:var(--gray-100);color:var(--gray-700)}
.nav-btn.active{background:var(--accent-light);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.conn-status{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:6px;font-size:12px;color:var(--gray-500);font-family:var(--mono)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--gray-300)}
.conn-dot.on{background:#10b981;box-shadow:0 0 0 2px #d1fae5}
.conn-dot.err{background:var(--lost)}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gray-200);background:var(--white);border-radius:6px;font-size:16px;transition:all .15s}
.icon-btn:hover{background:var(--gray-100);border-color:var(--gray-300)}
.btn-primary{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:13.5px;font-weight:500;transition:all .15s}
.btn-primary:hover{background:#1d4ed8;box-shadow:var(--shadow-sm)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.page{display:none;padding:24px}
.page.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:20px;box-shadow:var(--shadow-xs);transition:all .2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.stat-card.c-lead::before{background:var(--lead)}
.stat-card.c-qualify::before{background:var(--qualify)}
.stat-card.c-proposal::before{background:var(--proposal)}
.stat-card.c-won::before{background:var(--won)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-label{font-size:11.5px;font-weight:500;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.stat-value{font-size:28px;font-weight:600;letter-spacing:-.03em;color:var(--gray-900);line-height:1;margin-bottom:4px;font-family:var(--mono)}
.stat-sub{font-size:12px;color:var(--gray-400)}
.waterfall{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.wf-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;box-shadow:var(--shadow-xs);overflow:hidden;margin-bottom:16px}
.wf-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100)}
.wf-title{font-size:13.5px;font-weight:600;color:var(--gray-700)}
.wf-body{padding:16px 20px}
.funnel-bar{display:flex;height:10px;border-radius:99px;overflow:hidden;gap:2px;margin-bottom:12px}
.funnel-seg{height:100%;border-radius:99px;transition:flex .5s cubic-bezier(.4,0,.2,1)}
.funnel-legend{display:flex;flex-wrap:wrap;gap:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-500)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.act-list{display:flex;flex-direction:column;gap:0}
.act-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.act-item:last-child{border-bottom:none}
.act-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.act-info{flex:1;min-width:0}
.act-name{font-size:13px;font-weight:500;color:var(--gray-700)}
.act-time{font-size:11px;color:var(--gray-400);margin-top:1px}
.goal-item{margin-bottom:14px}
.goal-item:last-child{margin-bottom:0}
.goal-header{display:flex;justify-content:space-between;margin-bottom:6px}
.goal-label{font-size:13px;color:var(--gray-600)}
.goal-val{font-size:13px;font-weight:600;color:var(--gray-800);font-family:var(--mono)}
.progress-track{height:6px;background:var(--gray-100);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1) .2s}
.expiry-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.expiry-item:last-child{border-bottom:none}
.expiry-company{font-weight:500;color:var(--gray-800)}
.expiry-amount{font-family:var(--mono);color:var(--gray-600)}
.expiry-days{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
.expiry-days.urgent{background:#fee2e2;color:#991b1b}
.expiry-days.soon{background:#fef3c7;color:#92400e}
.expiry-days.ok{background:#d1fae5;color:#065f46}
.kanban-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--gray-200);border-radius:6px;padding:7px 12px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{border:none;outline:none;background:transparent;font-size:13.5px;width:200px;color:var(--gray-700)}
.search-box input::placeholder{color:var(--gray-400)}
.total-info{margin-left:auto;font-size:12px;color:var(--gray-400);background:var(--gray-100);padding:5px 12px;border-radius:6px;font-family:var(--mono)}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kanban-col{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:14px;overflow:hidden;transition:all .2s}
.kanban-col.drag-over{background:var(--accent-light);border-color:var(--accent-border);box-shadow:0 0 0 2px var(--accent-border)}
.col-header{padding:14px 16px 0;background:var(--white);border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px}
.col-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.col-title{font-size:13px;font-weight:600;color:var(--gray-700);flex:1}
.col-count{min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono)}
.col-amount{font-size:11px;color:var(--gray-400);font-family:var(--mono);padding:8px 16px 10px;background:var(--white);border-bottom:1px solid var(--gray-100)}
.col-cards{padding:10px;min-height:120px;display:flex;flex-direction:column;gap:8px}
.col-empty{border:1.5px dashed var(--gray-300);border-radius:8px;padding:20px;text-align:center;font-size:12px;color:var(--gray-400);margin:4px 0}
.deal-card{background:var(--white);border:1px solid var(--gray-200);border-radius:10px;padding:14px;cursor:grab;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-xs);position:relative;user-select:none;animation:cardIn .25s cubic-bezier(.4,0,.2,1) both}
@keyframes cardIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.deal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--gray-300)}
.deal-card:active{cursor:grabbing}
.deal-card.dragging{opacity:.4}
.card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.deal-card:hover .card-actions{opacity:1}
.card-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:var(--gray-100);border-radius:4px;font-size:12px;transition:background .15s}
.card-btn:hover{background:var(--gray-200)}
.deal-company{font-size:13.5px;font-weight:600;color:var(--gray-900);margin-bottom:2px;padding-right:56px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deal-contact{font-size:12px;color:var(--gray-400);margin-bottom:10px}
.deal-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.deal-amount{font-size:14px;font-weight:600;color:var(--gray-800);font-family:var(--mono)}
.deal-prob-wrap{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-400)}
.prob-bar{width:32px;height:3px;background:var(--gray-200);border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;background:var(--accent)}
.deal-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--gray-100)}
.deal-tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:var(--gray-100);color:var(--gray-500)}
.deal-date{font-size:11px;color:var(--gray-400)}
.owner-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white}
.add-card-btn{width:100%;padding:8px;border:1.5px dashed var(--gray-300);background:transparent;border-radius:6px;font-size:12.5px;color:var(--gray-400);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.list-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.filter-select{padding:7px 12px;border:1px solid var(--gray-200);border-radius:6px;background:var(--white);font-size:13px;color:var(--gray-700);outline:none}
.filter-select:focus{border-color:var(--accent)}
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-xs);border:1px solid var(--gray-200)}
.data-table th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;background:var(--gray-50);border-bottom:1px solid var(--gray-200)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--gray-100);font-size:13.5px;color:var(--gray-700)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--gray-50)}
.stage-pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:500}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.page-btn{padding:6px 12px;border:1px solid var(--gray-200);border-radius:6px;background:var(--white);font-size:13px;color:var(--gray-500);transition:all .15s}
.page-btn:hover{background:var(--gray-100)}
.page-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(16,24,40,.35);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;width:540px;max-width:95vw;max-height:90vh;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100);flex-shrink:0}
.modal-title{font-size:16px;font-weight:600;color:var(--gray-900)}
.modal-close{width:28px;height:28px;border:none;background:transparent;font-size:18px;color:var(--gray-400);border-radius:6px;transition:all .15s;line-height:1}
.modal-close:hover{background:var(--gray-100);color:var(--gray-700)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group.half{margin-bottom:0}
.form-label{font-size:12.5px;font-weight:500;color:var(--gray-700)}
.form-label span{color:var(--lost)}
.form-input{padding:9px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:13.5px;color:var(--gray-900);outline:none;transition:border-color .15s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input.error{border-color:var(--lost)}
.form-error{font-size:11.5px;color:var(--lost);margin-top:2px}
.range-wrap{display:flex;align-items:center;gap:10px}
.form-range{flex:1;accent-color:var(--accent)}
.range-val{font-size:13px;font-weight:600;color:var(--accent);font-family:var(--mono);min-width:36px;text-align:right}
.btn-cancel{padding:8px 18px;border:1px solid var(--gray-300);background:transparent;border-radius:6px;font-size:13.5px;color:var(--gray-600);transition:all .15s}
.btn-cancel:hover{background:var(--gray-100)}
.btn-save{padding:8px 20px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:13.5px;font-weight:500;transition:all .15s}
.btn-save:hover{background:#1d4ed8}
.security-note{font-size:12px;color:var(--gray-500);background:var(--gray-50);border:1px solid var(--gray-200);padding:10px 14px;border-radius:8px;margin-top:4px}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;background:var(--white);border:1px solid var(--gray-200);border-radius:12px;font-size:13px;color:var(--gray-700);box-shadow:var(--shadow-lg);animation:toastIn .3s cubic-bezier(.4,0,.2,1);max-width:300px}
.toast.success{border-color:#6ee7b7;background:#f0fdf4;color:#065f46}
.toast.error{border-color:#fca5a5;background:#fef2f2;color:#991b1b}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="brand-dot"></div>FlowCRM</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchPage('dashboard',this)">儀表板</button>
    <button class="nav-btn" onclick="switchPage('kanban',this)">銷售漏斗</button>
    <button class="nav-btn" onclick="switchPage('list',this)">客戶列表</button>
  </nav>
  <div class="topbar-right">
    <div class="conn-status"><div class="conn-dot" id="conn-dot"></div><span id="conn-text">Demo 模式</span></div>
    <button class="icon-btn" onclick="syncData()" title="同步">🔄</button>
    <button class="icon-btn" onclick="openSettings()" title="設定">⚙️</button>
    <button class="btn-primary" onclick="openDealModal(null)">＋ 新增商機</button>
  </div>
</div>
<div class="page active" id="page-dashboard">
  <div class="stats-row" id="stats-row"></div>
  <div class="waterfall">
    <div>
      <div class="wf-card">
        <div class="wf-header"><span class="wf-title">銷售漏斗分佈</span></div>
        <div class="wf-body">
          <div class="funnel-bar" id="funnel-bar"></div>
          <div class="funnel-legend" id="funnel-legend"></div>
        </div>
      </div>
      <div class="wf-card">
        <div class="wf-header"><span class="wf-title">最近活動</span></div>
        <div class="wf-body"><div class="act-list" id="act-list"><div style="color:var(--gray-400);font-size:13px;text-align:center;padding:20px">尚無活動記錄</div></div></div>
      </div>
    </div>
    <div>
      <div class="wf-card">
        <div class="wf-header"><span class="wf-title">本月業績目標</span></div>
        <div class="wf-body" id="goals-body"></div>
      </div>
      <div class="wf-card">
        <div class="wf-header"><span class="wf-title">即將到期商機</span></div>
        <div class="wf-body" id="expiry-body"></div>
      </div>
    </div>
  </div>
</div>
<div class="page" id="page-kanban">
  <div class="kanban-toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="kanban-search" placeholder="搜尋公司或聯絡人..." oninput="renderKanban()">
    </div>
    <select class="filter-select" id="kanban-owner" onchange="renderKanban()">
      <option value="">所有業務員</option>
    </select>
    <div class="total-info" id="kanban-total"></div>
  </div>
  <div class="kanban-board" id="kanban-board"></div>
</div>
<div class="page" id="page-list">
  <div class="list-toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="list-search" placeholder="搜尋..." oninput="state.currentPage=1;renderList()">
    </div>
    <select class="filter-select" id="list-stage" onchange="state.currentPage=1;renderList()">
      <option value="">所有階段</option>
      <option>潛在客戶</option><option>資格確認</option>
      <option>報價中</option><option>已成交</option>
    </select>
    <select class="filter-select" id="list-owner" onchange="state.currentPage=1;renderList()">
      <option value="">所有業務員</option>
    </select>
    <select class="filter-select" id="list-type" onchange="state.currentPage=1;renderList()">
      <option value="">所有型態</option>
      <option>廟宇</option><option>金融</option><option>食品</option>
      <option>實體通路</option><option>交通</option><option>支付</option>
      <option>人壽</option><option>農產</option>
    </select>
    <input type="file" id="excel-file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this)">
    <button class="btn-primary" onclick="document.getElementById('excel-file-input').click()">📥 匯入 Excel</button>
    <button class="btn-primary" style="margin-left:auto" onclick="openDealModal(null)">＋ 新增客戶</button>
  </div>
  <table class="data-table">
    <thead><tr>
      <th onclick="toggleSort('company')" style="cursor:pointer;user-select:none">公司 <span id="sort-company">↕</span></th>
      <th onclick="toggleSort('contact')" style="cursor:pointer;user-select:none">聯絡人 <span id="sort-contact">↕</span></th>
      <th onclick="toggleSort('phone')" style="cursor:pointer;user-select:none">電話 <span id="sort-phone">↕</span></th>
      <th onclick="toggleSort('email')" style="cursor:pointer;user-select:none">Email <span id="sort-email">↕</span></th>
      <th onclick="toggleSort('stage')" style="cursor:pointer;user-select:none">階段 <span id="sort-stage">↕</span></th>
      <th onclick="toggleSort('amount')" style="cursor:pointer;user-select:none">金額 <span id="sort-amount">↕</span></th>
      <th onclick="toggleSort('owner')" style="cursor:pointer;user-select:none">業務員 <span id="sort-owner">↕</span></th>
      <th onclick="toggleSort('type')" style="cursor:pointer;user-select:none">型態 <span id="sort-type">↕</span></th>
      <th onclick="toggleSort('created_at')" style="cursor:pointer;user-select:none">建立日期 <span id="sort-created_at">↕</span></th>
      <th>操作</th>

<div class="toast-wrap" id="toast-wrap"></div>
<script>
const CFG = {
  get url()     { return localStorage.getItem('crm_url') || '' },
  get owners()  { return (localStorage.getItem('crm_owners') || '陳業務,林業務,王業務').split(',').map(s=>s.trim()).filter(Boolean) },
  get goals()   { return JSON.parse(localStorage.getItem('crm_goals') || '{"deals":10,"amount":2000000,"clients":15}') },
};
const STAGE_COLOR = { '潛在客戶':'#f59e0b','資格確認':'#3b82f6','報價中':'#8b5cf6','已成交':'#10b981' };
const STAGE_BG    = { '潛在客戶':'#fef3c7','資格確認':'#dbeafe','報價中':'#ede9fe','已成交':'#d1fae5' };
const STAGE_FG    = { '潛在客戶':'#92400e','資格確認':'#1e40af','報價中':'#5b21b6','已成交':'#065f46' };
const OWNER_COLORS = ['#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4'];
const TYPE_OPTIONS = ['廟宇','金融','食品','實體通路','交通','支付','人壽','農產'];
const DEMO = [
  {id:'1',company:'台積電',contact:'王大明',phone:'02-1234-5678',email:'wang@tsmc.com',stage:'潛在客戶',amount:500000,probability:20,close_date:'2025-08-01',owner:'陳業務',type:'金融',notes:'',created_at:'2025-05-01'},
  {id:'2',company:'鴻海精密',contact:'李小芳',phone:'02-8765-4321',email:'li@foxconn.com',stage:'資格確認',amount:1200000,probability:50,close_date:'2025-07-15',owner:'林業務',type:'交通',notes:'',created_at:'2025-05-03'},
  {id:'3',company:'中華電信',contact:'張建國',phone:'02-2222-3333',email:'chang@cht.com',stage:'報價中',amount:800000,probability:75,close_date:'2025-06-30',owner:'陳業務',type:'支付',notes:'',created_at:'2025-05-05'},
  {id:'4',company:'全聯福利',contact:'劉美玲',phone:'02-5555-6666',email:'liu@pxmart.com',stage:'已成交',amount:350000,probability:100,close_date:'2025-05-20',owner:'林業務',type:'實體通路',notes:'',created_at:'2025-04-20'},
  {id:'5',company:'玉山銀行',contact:'吳宏達',phone:'02-7777-8888',email:'wu@esun.com',stage:'潛在客戶',amount:950000,probability:30,close_date:'2025-08-10',owner:'王業務',type:'金融',notes:'',created_at:'2025-05-02'},
  {id:'6',company:'台灣大哥大',contact:'陳志豪',phone:'02-3333-4444',email:'chen@tmo.com',stage:'資格確認',amount:620000,probability:45,close_date:'2025-07-20',owner:'王業務',type:'人壽',notes:'',created_at:'2025-05-04'},
  {id:'7',company:'遠東百貨',contact:'林雅婷',phone:'02-6666-7777',email:'lin@feds.com',stage:'報價中',amount:430000,probability:60,close_date:'2025-07-05',owner:'陳業務',type:'食品',notes:'',created_at:'2025-05-06'},
];
// 排序狀態：col=目前排序欄位, dir=方向(asc/desc)
let sortState = { col: null, dir: 'asc' };
// 切換排序欄位或方向
function toggleSort(col) {
  if (sortState.col === col) {
    // 同欄再按 → 切換方向
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    // 不同欄 → 重設為升冪
    sortState.col = col;
    sortState.dir = 'asc';
  }
  state.currentPage = 1;
  renderList();
}
let state = { deals: [...DEMO], activities: [], currentPage: 1, editingId: null };
async function callAPI(params) {
  if (!CFG.url) return null;
  try {
    const u = new URL(CFG.url);
    Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, String(v)));
    const res = await fetch(u.toString());
    const json = await res.json();
    setConn(json.ok);
    return json.ok ? json : null;
  } catch { setConn(false); return null; }
}
function setConn(ok) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'conn-dot ' + (ok ? 'on' : 'err');
  txt.textContent = ok ? '已連線' : '連線失敗';
}
async function syncData() {
  const res = await callAPI({ action:'getDeals' });
  if (res) { state.deals = res.data.map(r=>({id:String(r[0]),company:r[1],contact:r[2],phone:r[3],email:r[4],stage:r[5],amount:Number(r[6])||0,probability:Number(r[7])||0,close_date:r[8],owner:r[9],type:r[10],notes:r[11],created_at:r[12]})); }
  renderAll();
  if (res) toast('✓ 資料已同步', 'success');
}
function renderAll() {
  renderStats(); renderFunnel(); renderActivities(); renderGoals(); renderExpiry(); renderKanban(); renderList(); updateOwnerFilters();
}
function renderStats() {
  const d = state.deals;
  const thisMonth = new Date().toISOString().slice(0,7);
  const wonThisMonth = d.filter(x => x.stage==='已成交' && (x.close_date||'').startsWith(thisMonth));
  const cards = [
    {cls:'c-lead',   label:'潛在客戶', val: d.filter(x=>x.stage==='潛在客戶').length,   sub:'筆商機'},
    {cls:'c-qualify',label:'資格確認', val: d.filter(x=>x.stage==='資格確認').length,   sub:'筆商機'},
    {cls:'c-proposal',label:'報價中',  val: 'NT$'+fmt(d.filter(x=>x.stage==='報價中').reduce((s,x)=>s+x.amount,0)), sub:'總金額'},
    {cls:'c-won',    label:'本月成交', val: wonThisMonth.length,                          sub:'筆成交'},
    {cls:'c-won',    label:'成交總額', val: 'NT$'+fmt(d.filter(x=>x.stage==='已成交').reduce((s,x)=>s+x.amount,0)), sub:'累計'},
  ];
  document.getElementById('stats-row').innerHTML = cards.map(c=>`<div class="stat-card ${c.cls}"><div class="stat-label">${c.label}</div><div class="stat-value">${c.val}</div><div class="stat-sub">${c.sub}</div></div>`).join('');
}
function renderFunnel() {
  const stages = ['潛在客戶','資格確認','報價中','已成交'];
  const counts = stages.map(s => state.deals.filter(d=>d.stage===s).length);
  const total = counts.reduce((a,b)=>a+b,0) || 1;
  document.getElementById('funnel-bar').innerHTML = stages.map((s,i)=>`<div class="funnel-seg" style="flex:${counts[i]/total};background:${STAGE_COLOR[s]}" title="${s}: ${counts[i]}筆"></div>`).join('');
  document.getElementById('funnel-legend').innerHTML = stages.map((s,i)=>`<div class="leg-item"><div class="leg-dot" style="background:${STAGE_COLOR[s]}"></div>${s} (${counts[i]})</div>`).join('');
}
function renderActivities() {
  const list = document.getElementById('act-list');
  if (!state.activities.length) { list.innerHTML='<div style="color:var(--gray-400);font-size:13px;text-align:center;padding:20px">尚無活動記錄</div>'; return; }
  list.innerHTML = state.activities.slice(0,10).map((a,i)=>{
    const color = OWNER_COLORS[i % OWNER_COLORS.length];
    const time = new Date(a.time).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `<div class="act-item"><div class="act-avatar" style="background:${color}">${(a.action||'').charAt(0)}</div><div class="act-info"><div class="act-name">${esc(a.action)}</div><div class="act-time">${time}</div></div></div>`;
  }).join('');
}
function renderGoals() {
  const g = CFG.goals; const d = state.deals;
  const thisMonth = new Date().toISOString().slice(0,7);
  const wonDeals = d.filter(x=>x.stage==='已成交'&&(x.close_date||'').startsWith(thisMonth));
  const items = [
    {label:'成交筆數',cur:wonDeals.length,target:g.deals,color:'#10b981',unit:'筆'},
    {label:'成交金額',cur:wonDeals.reduce((s,x)=>s+x.amount,0),target:g.amount,color:'#3b82f6',unit:'NT$'},
    {label:'新增客戶',cur:d.filter(x=>(x.created_at||'').startsWith(thisMonth)).length,target:g.clients,color:'#8b5cf6',unit:'筆'},
  ];
  document.getElementById('goals-body').innerHTML = items.map(item=>{
    const pct = Math.min(100, Math.round((item.cur/item.target)*100)) || 0;
    const val = item.unit==='NT$' ? 'NT$'+fmt(item.cur)+' / NT$'+fmt(item.target) : item.cur+' / '+item.target+item.unit;
    return `<div class="goal-item"><div class="goal-header"><span class="goal-label">${item.label}</span><span class="goal-val">${val}</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${item.color}"></div></div></div>`;
  }).join('');
}
function renderExpiry() {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = state.deals.filter(d=>d.stage!=='已成交'&&d.close_date).map(d=>({...d,diff:Math.ceil((new Date(d.close_date)-today)/(1000*60*60*24))})).sort((a,b)=>a.diff-b.diff).slice(0,5);
  document.getElementById('expiry-body').innerHTML = upcoming.length ? upcoming.map(d=>{
    const cls = d.diff<0?'urgent':d.diff<=7?'soon':'ok';
    const label = d.diff<0?`逾期${-d.diff}天`:d.diff===0?'今天到期':`${d.diff}天後`;
    return `<div class="expiry-item"><span class="expiry-company">${esc(d.company)}</span><span class="expiry-amount">NT$${fmt(d.amount)}</span><span class="expiry-days ${cls}">${label}</span></div>`;
  }).join('') : '<div style="color:var(--gray-400);font-size:13px;text-align:center;padding:16px">無即將到期商機</div>';
}
function renderKanban() {
  const q = (document.getElementById('kanban-search').value||'').toLowerCase();
  const ow = document.getElementById('kanban-owner').value;
  const filtered = state.deals.filter(d=>(!q||d.company.toLowerCase().includes(q)||d.contact.toLowerCase().includes(q))&&(!ow||d.owner===ow));
  const total = filtered.reduce((s,d)=>s+d.amount,0);
  document.getElementById('kanban-total').textContent = `共 ${filtered.length} 筆・NT$${fmt(total)}`;
  const stages = ['潛在客戶','資格確認','報價中','已成交'];
  document.getElementById('kanban-board').innerHTML = stages.map(stage=>{
    const cards = filtered.filter(d=>d.stage===stage);
    const stageTotal = cards.reduce((s,d)=>s+d.amount,0);
    const color = STAGE_COLOR[stage]; const countBg = STAGE_BG[stage]; const countFg = STAGE_FG[stage];
    return `<div class="kanban-col" id="col-${stage}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropCard(event,'${stage}')">
      <div class="col-header"><div class="col-bar" style="background:${color}"></div><span class="col-title">${stage}</span><span class="col-count" style="background:${countBg};color:${countFg}">${cards.length}</span></div>
      <div class="col-amount">NT$${fmt(stageTotal)}</div>
      <div class="col-cards" id="cards-${stage}">${cards.map(d=>dealCardHTML(d)).join('')}${cards.length===0?'<div class="col-empty">拖曳卡片至此</div>':''}</div>
      <div style="padding:0 10px 10px"><button class="add-card-btn" onclick="openDealModal(null,'${stage}')">＋ 新增</button></div>
    </div>`;
  }).join('');
}
function dealCardHTML(d) {
  const ownerIdx = CFG.owners.indexOf(d.owner);
  const ownerColor = OWNER_COLORS[ownerIdx>=0?ownerIdx:0];
  const ownerInitial = (d.owner||'?').charAt(0);
  return `<div class="deal-card" draggable="true" id="card-${d.id}" ondragstart="dragStart(event,'${d.id}')" ondragend="dragEnd(event)">
    <div class="card-actions"><button class="card-btn" onclick="openDealModal('${d.id}')" title="編輯">✏️</button><button class="card-btn" onclick="deleteDeal('${d.id}')" title="刪除">🗑️</button></div>
    <div class="deal-company">${esc(d.company)}</div>
    <div class="deal-contact">${esc(d.contact)}</div>
    <div class="deal-meta"><span class="deal-amount">NT$${fmt(d.amount)}</span><div class="deal-prob-wrap"><div class="prob-bar"><div class="prob-fill" style="width:${d.probability}%"></div></div>${d.probability}%</div></div>
    <div class="deal-footer"><span class="deal-tag">${esc(d.type||'')}</span><span class="deal-date">${d.close_date||''}</span><div class="owner-avatar" style="background:${ownerColor}" title="${esc(d.owner||'')}">${ownerInitial}</div></div>
  </div>`;
}
let draggingId = null;
function dragStart(ev, id) { draggingId = id; ev.dataTransfer.effectAllowed = 'move'; setTimeout(()=>{ const el=document.getElementById('card-'+id); if(el) el.classList.add('dragging'); },0); }
function dragEnd(ev) { document.querySelectorAll('.deal-card').forEach(c=>c.classList.remove('dragging')); document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over')); }
async function dropCard(ev, newStage) {
  ev.preventDefault(); ev.currentTarget.classList.remove('drag-over');
  if (!draggingId) return;
  const deal = state.deals.find(d=>d.id===draggingId);
  if (!deal || deal.stage===newStage) return;
  deal.stage = newStage; renderKanban();
  toast(`✓ ${deal.company} → ${newStage}`, 'success');
  await callAPI({ action:'updateDeal', id:deal.id, stage:newStage, company:deal.company });
  draggingId = null;
}
function renderList() {
  const q = (document.getElementById('list-search').value||'').toLowerCase();
  const st = document.getElementById('list-stage').value;
  const ow = document.getElementById('list-owner').value;
  const ty = document.getElementById('list-type')?.value || '';
  // 先篩選
  let filtered = state.deals.filter(d=>(!q||[d.company,d.contact,d.email,d.phone,d.type].some(v=>(v||'').toLowerCase().includes(q)))&&(!st||d.stage===st)&&(!ow||d.owner===ow)&&(!ty||d.type===ty));
  // 排序邏輯
  if (sortState.col) {
    filtered = [...filtered].sort((a, b) => {
      let va = a[sortState.col] ?? '';
      let vb = b[sortState.col] ?? '';
      // 金額、機率用數值比較；日期轉時間；其餘用繁中友善字串比較
      if (['amount','probability'].includes(sortState.col)) {
        va = Number(va) || 0; vb = Number(vb) || 0;
      } else if (['created_at','close_date'].includes(sortState.col)) {
        va = va ? new Date(va).getTime() : 0; vb = vb ? new Date(vb).getTime() : 0;
      } else {
        va = String(va || ''); vb = String(vb || '');
        const cmpText = va.localeCompare(vb, 'zh-Hant');
        return sortState.dir === 'asc' ? cmpText : -cmpText;
      }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortState.dir === 'asc' ? cmp : -cmp;
    });
  }
  // 更新排序圖示：↕初始 ↑升冪 ↓降冪
  ['company','contact','phone','email','stage','amount','owner','type','created_at'].forEach(k => {
    const el = document.getElementById('sort-' + k);
    if (!el) return;
    el.textContent = sortState.col === k ? (sortState.dir === 'asc' ? '↑' : '↓') : '↕';
  });
  // 每頁 10 筆分頁
  const perPage=10, total=filtered.length, pages=Math.ceil(total/perPage)||1;
  if (state.currentPage>pages) state.currentPage=1;
  const slice = filtered.slice((state.currentPage-1)*perPage, state.currentPage*perPage);
  document.getElementById('list-tbody').innerHTML = slice.map(d=>{
    const stageStyle = `background:${STAGE_BG[d.stage]};color:${STAGE_FG[d.stage]}`;
    return `<tr><td><strong>${esc(d.company)}</strong></td><td>${esc(d.contact)}</td><td>${esc(d.phone||'')}</td><td>${esc(d.email||'')}</td><td><span class="stage-pill" style="${stageStyle}">${d.stage}</span></td><td style="font-family:var(--mono)">NT$${fmt(d.amount)}</td><td>${esc(d.owner||'')}</td><td>${esc(d.type||'')}</td><td>${(d.created_at||'').slice(0,10)}</td><td style="display:flex;gap:6px"><button class="card-btn" onclick="openDealModal('${d.id}')">✏️</button><button class="card-btn" onclick="deleteDeal('${d.id}')">🗑️</button></td></tr>`;
  }).join('') || `<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--gray-400)">無符合資料</td></tr>`;
  const pg = document.getElementById('pagination');
  if (pages<=1) { pg.innerHTML=''; return; }
  pg.innerHTML = Array.from({length:pages},(_,i)=>i+1).map(p=>`<button class="page-btn ${p===state.currentPage?'active':''}" onclick="state.currentPage=${p};renderList()">${p}</button>`).join('');
}
function updateOwnerFilters() {
  const owners = CFG.owners;
  ['kanban-owner','list-owner'].forEach(id=>{ const el=document.getElementById(id); const cur=el.value; el.innerHTML='<option value="">所有業務員</option>'+owners.map(o=>`<option ${o===cur?'selected':''}>${esc(o)}</option>`).join(''); });
  const fo = document.getElementById('f-owner');
  if (fo) fo.innerHTML = owners.map(o=>`<option>${esc(o)}</option>`).join('');
}
function openDealModal(id, defaultStage) {
  state.editingId = id;
  const d = id ? state.deals.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = id ? '編輯商機' : '新增商機';
  document.getElementById('f-company').value = d?.company||'';
  document.getElementById('f-contact').value = d?.contact||'';
  document.getElementById('f-phone').value = d?.phone||'';
  document.getElementById('f-email').value = d?.email||'';
  document.getElementById('f-stage').value = d?.stage||defaultStage||'潛在客戶';
  document.getElementById('f-amount').value = d?.amount||'';
  document.getElementById('f-prob').value = d?.probability||50;
  document.getElementById('prob-val').textContent = (d?.probability||50)+'%';
  document.getElementById('f-date').value = d?.close_date||'';
  document.getElementById('f-type').value = TYPE_OPTIONS.includes(d?.type) ? d.type : '廟宇';
  document.getElementById('f-notes').value = d?.notes||'';
  updateOwnerFilters();
  if (d?.owner) document.getElementById('f-owner').value = d.owner;
  ['company','contact','email','amount'].forEach(k=>{ document.getElementById('e-'+k).textContent=''; document.getElementById('f-'+k).classList.remove('error'); });
  document.getElementById('deal-modal').classList.add('open');
}
async function saveDeal() {
  let valid = true;
  ['company','contact'].forEach(k=>{ const v=document.getElementById('f-'+k).value.trim(); if(!v){document.getElementById('e-'+k).textContent='必填欄位';document.getElementById('f-'+k).classList.add('error');valid=false;}else{document.getElementById('e-'+k).textContent='';document.getElementById('f-'+k).classList.remove('error');} });
  const email = document.getElementById('f-email').value.trim();
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('e-email').textContent='Email 格式不正確'; document.getElementById('f-email').classList.add('error'); valid=false; }
  const amount = document.getElementById('f-amount').value;
  if (amount && (isNaN(amount)||Number(amount)<0)) { document.getElementById('e-amount').textContent='請輸入正確金額'; document.getElementById('f-amount').classList.add('error'); valid=false; }
  if (!valid) return;
  const params = { action:state.editingId?'updateDeal':'addDeal', id:state.editingId||'', company:document.getElementById('f-company').value.trim(), contact:document.getElementById('f-contact').value.trim(), phone:document.getElementById('f-phone').value.trim(), email:document.getElementById('f-email').value.trim(), stage:document.getElementById('f-stage').value, amount:Number(document.getElementById('f-amount').value)||0, probability:Number(document.getElementById('f-prob').value)||0, close_date:document.getElementById('f-date').value, owner:document.getElementById('f-owner').value, type:document.getElementById('f-type').value, industry:document.getElementById('f-type').value, notes:document.getElementById('f-notes').value.trim() };
  const btn = document.getElementById('btn-save-deal'); btn.disabled=true; btn.textContent='⏳ 儲存中...';
  if (state.editingId) { const old=state.deals.find(d=>d.id===state.editingId); if(old){params.oldStage=old.stage;Object.assign(old,params);} } else { state.deals.push({...params,id:Date.now().toString(),created_at:new Date().toISOString()}); }
  closeModal('deal-modal'); renderAll();
  toast(`✓ ${params.company} 已${state.editingId?'更新':'新增'}`, 'success');
  await callAPI(params); btn.disabled=false; btn.textContent='儲存';
}
async function deleteDeal(id) {
  const deal = state.deals.find(d=>d.id===id); if(!deal) return;
  if (!confirm(`確定要刪除「${deal.company}」嗎？`)) return;
  state.deals = state.deals.filter(d=>d.id!==id); renderAll();
  toast(`🗑️ ${deal.company} 已刪除`, 'success');
  await callAPI({ action:'deleteDeal', id });
}
// Excel 匯入：使用 SheetJS 解析 .xlsx/.xls/.csv
// 欄位對應：A=company B=contact C=phone D=email E=stage F=amount G=probability H=close_date I=owner J=type K=notes
function importExcel(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      // 用 SheetJS 讀取二進位資料
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // 轉成二維陣列，header:1 表示不自動用第一列當 key
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!rows.length) { toast('❌ 檔案無資料', 'error'); input.value=''; return; }

      // 判斷第一列是否為標題列：支援中文／英文表頭，不會誤跳過第一筆客戶
      let startRow = 0;
      const headerText = rows[0].map(v => String(v||'').trim().toLowerCase()).join('|');
      if (/公司|公司名稱|company|聯絡人|contact|型態|type/.test(headerText)) {
        startRow = 1; // 第一列是標題，從第二列開始
      }

      const validStages = ['潛在客戶', '資格確認', '報價中', '已成交'];
      const validTypes = TYPE_OPTIONS;
      let imported = 0;
      let skipped = 0;

      for (let i = startRow; i < rows.length; i++) {
        const row = rows[i];
        const company = String(row[0]||'').trim();
        const contact = String(row[1]||'').trim();
        // 公司和聯絡人都必填，否則跳過
        if (!company || !contact) { skipped++; continue; }

        const stage = validStages.includes(String(row[4]||'').trim()) ? String(row[4]).trim() : '潛在客戶';
        const type = validTypes.includes(String(row[9]||'').trim()) ? String(row[9]).trim() : '廟宇';
        // 生成唯一 id：時間戳 + 索引，避免重複
        const newId = Date.now().toString() + '_' + i;
        const importedDeal = {
          id: newId,
          company,
          contact,
          phone: String(row[2]||'').trim(),
          email: String(row[3]||'').trim(),
          stage,
          amount: Number(row[5]) || 0,
          probability: Number(row[6]) || 0,
          close_date: String(row[7]||'').trim(),
          owner: String(row[8]||'').trim(),
          type,
          notes: String(row[10]||'').trim(),
          created_at: new Date().toISOString()
        };
        state.deals.push(importedDeal);
        // 若已連線 Google Sheets，順手寫入後端，避免下次同步消失
        if (CFG.url) callAPI({ action:'addDeal', ...importedDeal });
        imported++;
      }

      if (imported > 0) {
        renderAll();
        toast(`✓ 成功匯入 ${imported} 筆${skipped?'（跳過 '+skipped+' 筆空白列）':''}`, 'success');
      } else {
        toast('❌ 無法匯入：欄位格式不符，請確認 A=公司 B=聯絡人', 'error');
      }
    } catch(err) {
      toast('❌ 匯入失敗：' + err.message, 'error');
    }
    // 清空 input 讓同一檔案可重複匯入
    input.value = '';
  };
  reader.readAsBinaryString(file);
}
function openSettings() {
  document.getElementById('s-url').value = CFG.url;
  document.getElementById('s-owners').value = CFG.owners.join('\n');
  const g = CFG.goals;
  document.getElementById('s-goal-deals').value = g.deals;
  document.getElementById('s-goal-amount').value = g.amount;
  document.getElementById('s-goal-clients').value = g.clients;
  document.getElementById('settings-modal').classList.add('open');
}
function saveSettings() {
  const url = document.getElementById('s-url').value.trim();
  const owners = document.getElementById('s-owners').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const goals = { deals:Number(document.getElementById('s-goal-deals').value)||10, amount:Number(document.getElementById('s-goal-amount').value)||2000000, clients:Number(document.getElementById('s-goal-clients').value)||15 };
  localStorage.setItem('crm_url', url); localStorage.setItem('crm_owners', owners.join(',')); localStorage.setItem('crm_goals', JSON.stringify(goals));
  closeModal('settings-modal'); toast('✓ 設定已儲存', 'success');
  if (url) { setConn(true); syncData(); }
  updateOwnerFilters(); renderAll();
}
function switchPage(name, btn) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('page-'+name).classList.add('active'); if(btn) btn.classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg, type='success') { const el=document.createElement('div'); el.className='toast '+type; el.textContent=msg; document.getElementById('toast-wrap').appendChild(el); setTimeout(()=>{ el.style.animation='toastOut .3s ease forwards'; setTimeout(()=>el.remove(),300); },3000); }
function fmt(n) { if(n>=10000) return Math.round(n/10000)+'萬'; return Number(n).toLocaleString(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
setInterval(()=>{ if(CFG.url) syncData(); }, 30000);
renderAll();
if (CFG.url) { setConn(true); syncData(); }
</script>
